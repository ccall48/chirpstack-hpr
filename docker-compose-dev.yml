services:
  chirpstack-hpr-v2:
    build: .
    container_name: chirpstack-hpr-v2-dev
    restart: unless-stopped
    volumes:
      - ./app:/app
      - ${HELIUM_KEYPAIR_PATH}:/app/delegate_key.bin:ro
    environment:
      # Helium (Required)
      - HELIUM_CONFIG_HOST=${HELIUM_CONFIG_HOST}
      - HELIUM_KEYPAIR_BIN=${HELIUM_KEYPAIR_BIN}
      - HELIUM_NET_ID=${HELIUM_NET_ID}
      - HELIUM_OUI=${HELIUM_OUI}
      - HELIUM_MAX_COPIES=${HELIUM_MAX_COPIES}
      - ROUTE_ID=${ROUTE_ID}
      # ChirpStack (Required)
      - CHIRPSTACK_SERVER=${CHIRPSTACK_SERVER}
      - CHIRPSTACK_APIKEY=${CHIRPSTACK_APIKEY}
      - REDIS_HOST=${REDIS_HOST}
      # Database (Required)
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASS=${POSTGRES_PASS}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_SSL_MODE=${POSTGRES_SSL_MODE}
      - POSTGRES_DB=${POSTGRES_DB}
    command: sh -c 'cd /app && python app.py'

networks:
  default:
    name: core-infra
    external: true

